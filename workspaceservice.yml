server:
  port: 8083


spring:

  datasource:

    url:
      jdbc:postgresql://localhost:5432/workspace_db

    username:
      postgres

    password:
      postgres

    driver-class-name:
      org.postgresql.Driver


  jpa:

    hibernate:

      ddl-auto:
        update

    show-sql:
      true

    properties:

      hibernate:

        format_sql:
          true


eureka:

  client:

    register-with-eureka:
      true

    fetch-registry:
      true

    service-url:

      defaultZone:
        http://localhost:8761/eureka


management:

  endpoints:

    web:

      exposure:

        include:
          "*"


logging:

  level:

    org.springframework:
      INFO

    com.project:
      DEBUG