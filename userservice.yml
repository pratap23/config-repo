server:
  port: 8082


spring:

  application:
    name: userservice


  config:
    import: optional:configserver:http://localhost:8070


  # ==========================
  # DATABASE
  # ==========================

  datasource:

    url: jdbc:postgresql://localhost:5432/user_db

    username: postgres

    password: postgres

    driver-class-name: org.postgresql.Driver


  # ==========================
  # JPA
  # ==========================

  jpa:

    show-sql: true

    hibernate:
      ddl-auto: update

    properties:

      hibernate:

        format_sql: true


  # ==========================
  # SQL INIT
  # ==========================

  sql:

    init:

      mode: never


  # ==========================
  # KAFKA
  # ==========================

  kafka:

    bootstrap-servers:
      localhost:9092


    # ---------- PRODUCER ----------

    producer:

      key-serializer:
        org.apache.kafka.common.serialization.StringSerializer

      value-serializer:
        org.springframework.kafka.support.serializer.JsonSerializer

      properties:

        spring:

          json:

            add:
              type:
                headers: false


    # ---------- CONSUMER ----------

    consumer:

      group-id:
        userservice-group

      auto-offset-reset:
        earliest

      key-deserializer:
        org.apache.kafka.common.serialization.StringDeserializer

      value-deserializer:
        org.springframework.kafka.support.serializer.JsonDeserializer

      properties:

        spring:

          json:

            trusted:
              packages: "*"



  # ==========================
  # CACHE
  # ==========================

  cache:
    type: simple



  # ==========================
  # MULTIPART
  # ==========================

  servlet:

    multipart:

      max-file-size: 10MB

      max-request-size: 20MB



# ==========================
# EUREKA
# ==========================

eureka:

  client:

    service-url:

      defaultZone:
        http://localhost:8761/eureka


    fetch-registry: true

    register-with-eureka: true


  instance:

    prefer-ip-address: true



# ==========================
# ACTUATOR
# ==========================

management:

  endpoints:

    web:

      exposure:

        include: "*"


  endpoint:

    health:

      show-details: always



# ==========================
# LOGGING
# ==========================

logging:

  level:

    org.springframework.kafka: INFO

    com.project.userservice: DEBUG