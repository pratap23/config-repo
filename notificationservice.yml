server:
  port: 8088

spring:

  datasource:
    #    url: jdbc:postgresql://localhost:5432/notification_db
    url: jdbc:postgresql://postgres:5432/notification_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  data:
    mongodb:
      #      uri: mongodb://admin:admin@mongodb:27017/notification_db?authSource=admin
      uri: mongodb://admin:admin@mongodb:27017/notification_db?authSource=admin
  
  # Uncomment later after Kafka testing
  #
  #  mail:
  #    host: smtp.gmail.com
  #    port: 587
  #    username: yourmail@gmail.com
  #    password: app-password
  #    properties:
  #      mail:
  #        smtp:
  #          auth: true
  #          starttls:
  #            enable: true

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

  kafka:

    bootstrap-servers: kafka:9092

    consumer:

      group-id: notification

      auto-offset-reset: earliest

      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      properties:

        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer

        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer

        spring.json.trusted.packages: "*"

        spring.json.use.type.headers: false

        spring.json.value.default.type: com.org.projectmanagement.notificationservice.event.UserCreatedEvent

eureka:
  instance:
    prefer-ip-address: true

  client:
    service-url:
      defaultZone: http://serviceregistry:8761/eureka

management:

  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

  prometheus:
    metrics:
      export:
        enabled: true

  tracing:
    sampling:
      probability: 1.0



  zipkin:
    base-url: http://zipkin:9411