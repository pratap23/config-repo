server:
  port: 8088


spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto:
        update

  kafka:
    bootstrap-servers:
      localhost:9092

    consumer:
      group-id:
        notification
      auto-offset-reset:
        earliest
      key-deserializer:
        org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer:
        org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring:
          deserializer:
            value:
              delegate:
                class:
                  org.springframework.kafka.support.serializer.JsonDeserializer


          json:
            trusted:
              packages:
                "*"

            value:
              default:
                type:
                  com.org.projectmanagement.notificationservice.event.UserCreatedEvent


eureka:
  client:
    service-url:
      defaultZone:
        http://localhost:8761/eureka