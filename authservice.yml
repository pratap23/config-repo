server:
  port: 8081



spring:
  datasource:
    #    url: jdbc:postgresql://localhost:5432/auth_db
    url: jdbc:postgresql://postgres:5432/auth_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update

jwt:
  secret: my-super-secret-key-for-jwt-project
  expiration: 86400000

eureka:
  instance:
    prefer-ip-address: true

  client:
    service-url:
      defaultZone: http://serviceregistry:8761/eureka

management:

  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

  prometheus:
    metrics:
      export:
        enabled: true

  tracing:
    sampling:
      probability: 1.0



  zipkin:
    base-url: http://zipkin:9411