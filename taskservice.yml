server:
  port: 8086

spring:

  datasource:

    url:
      jdbc:postgresql://localhost:5432/task_db

    username:
      postgres

    password:
      postgres

  data:

    redis:

      host:
        localhost

      port:
        6379

  kafka:

    bootstrap-servers:
      localhost:9092

  jpa:

    hibernate:

      ddl-auto:
        update

eureka:

  client:

    service-url:

      defaultZone:
        http://localhost:8761/eureka