server:
  port: 8080


jwt:
  secret: my-super-secret-key-for-jwt-project

spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: auth
          uri:
            lb://AUTHSERVICE
          predicates:
            - Path=/api/v1/auth/**


        - id: users
          uri:
            lb://USERSERVICE
          predicates:
            - Path=/api/v1/users/**

        - id: workspace
          uri:
            lb://WORKSPACESERVICE
          predicates:
            - Path=/workspaces/**

        - id: projects
          uri:
            lb://PROJECTSERVICE
          predicates:
            - Path=/projects/**

        - id: sprints
          uri:
            lb://SPRINTSERVICE
          predicates:
            - Path=/sprints/**

        - id: tasks
          uri:
            lb://TASKSERVICE
          predicates:
            - Path=/tasks/**

        - id: notifications
          uri:
            lb://NOTIFICATIONSERVICE
          predicates:
            - Path=/notifications/**


eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
  client:
    service-url:
      defaultZone:
        http://localhost:8761/eureka


management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    gateway:
      access: unrestricted